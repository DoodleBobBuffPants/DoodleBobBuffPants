name: Build

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: './yarn.lock'
      - run: yarn install --immutable
      - run: yarn lint:check
      - run: yarn test
      - run: yarn build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
